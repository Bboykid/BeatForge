<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BeatForge{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5; color: #333; min-height: 100vh;
  }
  .nav {
    background: #fff; border-bottom: 1px solid #e8e8e8;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-inner {
    max-width: 960px; margin: 0 auto; padding: 0 20px;
    display: flex; align-items: center; height: 52px; gap: 4px;
  }
  .nav-brand {
    font-size: 18px; font-weight: 700; margin-right: 24px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-link {
    padding: 8px 18px; border-radius: 6px; text-decoration: none;
    font-size: 14px; font-weight: 500; color: #666;
    transition: all .15s;
  }
  .nav-link:hover { background: #f5f5f5; color: #333; }
  .nav-link.active { background: #667eea; color: #fff; }
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
</style>
{% block head_extra %}{% endblock %}
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">BeatForge</a>
    <a href="/" class="nav-link {% if nav_active == 'separate' %}active{% endif %}">分离</a>
    <a href="/wiki" class="nav-link {% if nav_active == 'wiki' %}active{% endif %}">Wiki</a>
  </div>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
{% block content_extra %}{% endblock %}
</body>
</html>
