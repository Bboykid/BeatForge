{% extends "base.html" %}
{% block title %}BeatForge - {{ title }}{% endblock %}
{% block head_extra %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 700; }
  .btn-group { display: flex; gap: 8px; }
  .btn-edit, .btn-back {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    text-decoration: none; transition: all .15s;
  }
  .btn-edit { background: #667eea; color: #fff; }
  .btn-edit:hover { background: #5a6fd6; }
  .btn-back { background: #f0f0f0; color: #666; }
  .btn-back:hover { background: #e0e0e0; }
  .wiki-content {
    background: #fff; border-radius: 10px; padding: 32px 36px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06); line-height: 1.8; font-size: 15px;
    overflow-x: auto;
  }
  .wiki-content h1 { font-size: 26px; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
  .wiki-content h1:first-child { margin-top: 0; }
  .wiki-content h2 { font-size: 20px; margin: 24px 0 10px; }
  .wiki-content h3 { font-size: 17px; margin: 20px 0 8px; }
  .wiki-content p { margin: 8px 0; }
  .wiki-content ul, .wiki-content ol { margin: 8px 0; padding-left: 24px; }
  .wiki-content li { margin: 4px 0; }
  .wiki-content a { color: #667eea; text-decoration: none; }
  .wiki-content a:hover { text-decoration: underline; }
  .wiki-content code {
    background: #f5f5f5; padding: 2px 6px; border-radius: 4px;
    font-size: 13px; font-family: "SF Mono", Consolas, monospace;
  }
  .wiki-content pre {
    background: #f5f5f5; padding: 16px; border-radius: 8px;
    overflow-x: auto; margin: 12px 0;
  }
  .wiki-content pre code { background: none; padding: 0; }
  .wiki-content blockquote {
    border-left: 4px solid #667eea; padding: 8px 16px; margin: 12px 0;
    background: #f8f9ff; border-radius: 0 6px 6px 0;
  }
  .wiki-content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  .wiki-content th, .wiki-content td {
    border: 1px solid #e0e0e0; padding: 8px 12px; text-align: left;
  }
  .wiki-content th { background: #f5f5f5; font-weight: 600; }
  .wiki-content hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
</style>
{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ title }}</h1>
  <div class="btn-group">
    <a href="/wiki" class="btn-back">← 返回 Wiki</a>
    <a href="/wiki/{{ page_name }}/edit" class="btn-edit">编辑</a>
  </div>
</div>
<div class="wiki-content" id="wiki-content">{{ content }}</div>
<script>
  if (typeof marked !== 'undefined') {
    marked.setOptions({ gfm: true });
    document.getElementById('wiki-content').innerHTML =
      marked.parse(document.getElementById('wiki-content').textContent);
  }
</script>
{% endblock %}
